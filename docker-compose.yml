services:
  lambda:
    build:
      context: .
      dockerfile: Dockerfile
    image: extractos-bancarios:latest
    ports:
      - "9000:8080"
    environment:
      LOG_LEVEL: DEBUG
      PIPELINE_STRICT: "false"
      DEFAULT_ENCODING: utf-8
      S3_BUCKET: ${S3_BUCKET:-extractos-bancarios}
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-extractos}
      DB_USER: ${DB_USER:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_TABLE: ${DB_TABLE:-impo_uni_archivos_upload}
    volumes:
      - ./tests/samples:/samples

  test:
    image: extractos-bancarios:latest
    entrypoint: ["sh", "-c", "pip install -e '.[dev]' && python -m pytest tests/ -v"]
    environment:
      LOG_LEVEL: DEBUG
      PIPELINE_STRICT: "false"
      S3_BUCKET: ${S3_BUCKET:-extractos-bancarios}
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME:-extractos}
      DB_USER: ${DB_USER:-sa}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_TABLE: ${DB_TABLE:-impo_uni_archivos_upload}

  lint:
    image: extractos-bancarios:latest
    entrypoint: ["sh", "-c", "pip install -e '.[dev]' && ruff check src/ tests/"]

  typecheck:
    image: extractos-bancarios:latest
    entrypoint: ["sh", "-c", "pip install -e '.[dev]' && mypy src/"]
